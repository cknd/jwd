<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>JWD Tests</title>
    <style>
      body {
        margin: 0;
        font-family: "IBM Plex Sans", sans-serif;
        background: #f4f6f1;
        color: #1b221d;
      }

      main {
        max-width: 60rem;
        margin: 0 auto;
        padding: 2rem 1rem 4rem;
      }

      h1 {
        margin-top: 0;
      }

      .test-result {
        border: 1px solid #cfd8cd;
        border-radius: 12px;
        padding: 0.9rem;
        margin-bottom: 0.85rem;
        background: white;
      }

      .test-result.pass {
        border-color: #4f8f75;
      }

      .test-result.fail {
        border-color: #9d4b25;
        background: #fff6f2;
      }

      code {
        font-family: "IBM Plex Mono", monospace;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>jwd tests</h1>
      <p>These are browser-native tests for JSON import/export, local storage loading, state sanitization, and dynamic row expansion logic.</p>
      <div id="results"></div>
    </main>
    <script type="module" src="./tests.js"></script>
  </body>
</html>
